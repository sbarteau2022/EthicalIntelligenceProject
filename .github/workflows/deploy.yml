name: Deploy Site

# Deploys the Astro build to Cloudflare Pages (ethicalintelligenceproject.pages.dev).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — API token with the "Cloudflare Pages — Edit" permission
#   CLOUDFLARE_ACCOUNT_ID — the account ID shown on the Cloudflare dashboard
#
# Optional repository secret:
#   PUBLIC_GOOGLE_CLIENT_ID — Google OAuth "Web application" client ID (public,
#     not a secret in the security sense, but stored as one for convenience).
#     Baked into the static build so HubAuth's Google-only sign-in and /elle's
#     "Continue with Google" actually render a working button. The matching
#     elle-worker secret (GOOGLE_CLIENT_ID, same value) must also be set —
#     see src/components/hub/HubAuth.astro. Left unset → sign-in shows a
#     "temporarily unavailable" message instead of a broken button.
#
# Push to main   → production deploy
# Pull request   → preview deploy (unique preview URL per branch)
# Manual         → workflow_dispatch re-deploys production from main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# One deploy at a time per ref. Prevents rapid merges (or a manual run racing a
# push) from running two `wrangler pages deploy` calls against the same project.
concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & deploy to Cloudflare Pages
    permissions:
      contents: read
    # The secrets context can't be read in step `if:` directly — surface
    # presence through an env var so the deploy step can skip gracefully
    # (with a notice) instead of failing red while secrets are unset.
    env:
      HAS_CF_SECRETS: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Never ship a red build: the same gate CI runs (astro check + ESLint +
      # Prettier), enforced again on the deploy path.
      - run: npm run check

      - run: npm run build
        env:
          PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.PUBLIC_GOOGLE_CLIENT_ID }}

      # Production on main / manual runs; branch-named preview on PRs.
      # `--branch` controls which environment Pages targets: the production
      # branch name deploys to production, anything else gets a preview URL.
      - name: Deploy
        if: env.HAS_CF_SECRETS == 'true'
        run: >
          npx wrangler pages deploy dist
          --project-name=ethicalintelligenceproject
          --branch=${{ github.event_name == 'pull_request' && github.head_ref || 'main' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy skipped — secrets not configured
        if: env.HAS_CF_SECRETS != 'true'
        run: >
          echo "::warning::Build succeeded but deploy was skipped:
          set the CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repository
          secrets to enable Cloudflare Pages deploys (see this file's header)."

      # Read-only. Deploys have been landing as "preview" instead of "production"
      # on pushes to main even though the dashboard shows main as the production
      # branch. Surface Cloudflare's own view of the project (its configured
      # production branch, verbatim) and the last few deployments' actual
      # environment classification, so the next fix is based on API data instead
      # of a dashboard screenshot.
      - name: Diagnose production vs. preview classification
        if: always() && env.HAS_CF_SECRETS == 'true'
        run: |
          echo "### wrangler pages project list"
          npx wrangler pages project list
          echo
          echo "### wrangler pages deployment list (most recent first)"
          npx wrangler pages deployment list --project-name=ethicalintelligenceproject
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
