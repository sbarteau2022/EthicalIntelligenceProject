name: Deploy Ethical Intelligence Project

# Auto-deploys the Astro site to Cloudflare Pages on every push to main (or
# manual dispatch). Added because this repo only had CI (build/check) — no
# deploy step — and relied on Cloudflare Pages'/Netlify's/Vercel's own Git
# integration, which (as seen on RAPIDAi) can silently stop tracking a repo
# and leave commits on main never actually shipped.
on:
  push:
    branches: [main]
  workflow_dispatch:

# One deploy at a time; a push and a manual run can't overlap.
concurrency:
  group: deploy-ethicalintelligenceproject
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & deploy to Cloudflare Pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Deploy
        run: npx wrangler pages deploy dist --project-name=ethicalintelligenceproject
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
