site:
  name: The Observer Foundation
  site: 'https://ethicalintelligenceproject.pages.dev'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: false

metadata:
  title:
    default: The Observer Foundation — ElleAI
    template: '%s — The Observer Foundation'
  description: >-
    An ethical intelligence ecosystem. ElleAI — a philosophical corpus-grounded
    AI presence built toward sovereignty.
  robots:
    index: true
    follow: true
  openGraph:
    site_name: The Observer Foundation
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@observerfoundation'
    site: '@observerfoundation'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: false
    postsPerPage: 6
    post:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true
    list:
      isEnabled: false
      pathname: 'blog'
      robots:
        index: true
    category:
      isEnabled: false
      pathname: 'category'
      robots:
        index: true
    tag:
      isEnabled: false
      pathname: 'tag'
      robots:
        index: false

analytics:
  vendors:
    googleAnalytics:
      id: null
      partytown: false

ui:
  theme: 'system'