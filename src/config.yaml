site:
  name: The Ethical Intelligence Project
  site: 'https://ethicalintelligenceproject.pages.dev'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: false

metadata:
  title:
    default: The Ethical Intelligence Project — Powered by Elle AI
    template: '%s — The Ethical Intelligence Project'
  description: >-
    Community-based intelligence infrastructure that transforms complexity into
    action. Powered by Elle AI — a corpus-grounded intelligence built to serve
    the people doing the work.
  robots:
    index: true
    follow: true
  openGraph:
    site_name: The Ethical Intelligence Project
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@ethicalintel'
    site: '@ethicalintel'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: false
    postsPerPage: 6
    post:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true
    list:
      isEnabled: false
      pathname: 'blog'
      robots:
        index: true
    category:
      isEnabled: false
      pathname: 'category'
      robots:
        index: true
    tag:
      isEnabled: false
      pathname: 'tag'
      robots:
        index: false

analytics:
  vendors:
    googleAnalytics:
      id: null
      partytown: false

ui:
  theme: 'system'
